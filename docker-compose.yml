version: "3.8"

services:
  mysql-main:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: main_project
    ports:
      - "3307:3306"
    volumes:
      - mysql-main-data:/var/lib/mysql

  mysql-local:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_sync
    ports:
      - "3308:3306"
    volumes:
      - mysql-local-data:/var/lib/mysql
      - ./scripts/migrations:/docker-entrypoint-initdb.d

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "6831:6831/udp"
      - "16686:16686"
      - "14268:14268"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  user-sync-service:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - DATABASE_MAIN_HOST=mysql-main
      - DATABASE_LOCAL_HOST=mysql-local
    depends_on:
      - mysql-main
      - mysql-local
      - jaeger
      - prometheus

volumes:
  mysql-main-data:
  mysql-local-data:
