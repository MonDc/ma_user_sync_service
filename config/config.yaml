server:
  port: "8080"
  read_timeout: 15
  write_timeout: 15
  idle_timeout: 60

log:
  level: "info"

database:
  mi:
    host: "${MI_DB_HOST}"      # Placeholder
    port: 3306
    user: "${MI_DB_USER}"       # From .env
    password: "${MI_DB_PASS}"   # From .env
    dbname: "mi_db"
    max_conns: 25
    min_conns: 5
  
  ma:
    host: "${MA_DB_HOST}"
    port: 3306
    user: "${MA_DB_USER}"
    password: "${MA_DB_PASS}"
    dbname: "ma_db"
    max_conns: 25
    min_conns: 5