server:
  port: "8080"
  read_timeout: 15
  write_timeout: 15
  idle_timeout: 60

log:
  level: "info"

database:
  mi:
    host: "${SQL_SERVER_22}"    #  CENTRAL22 is a db server for all services now. In the future, we can separate them, to prevent single point of failure.
    port: 3306
    user: "${SQL_SERVER_22_DB_USER}"       # From .env
    password: "${SQL_SERVER_22_DB_PASS}"   # From .env
    dbname: "${MI}"
    max_conns: 25
    min_conns: 5
  
  ma:
    host: "${SQL_SERVER_22}"    # Use the same DB server for both services
    port: 3306
    user: "${SQL_SERVER_22_DB_USER}"
    password: "${SQL_SERVER_22_DB_PASS}"
    dbname: "${MA}"
    max_conns: 25
    min_conns: 5